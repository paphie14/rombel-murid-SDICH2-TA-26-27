<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Rombel</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:15px;
    background:#0d1117;
    color:#c9d1d9;
    font-family:Arial, Helvetica, sans-serif;
    line-height:1.5;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
}

.repo-box{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    padding:20px;
}

.header-box{
    width:70%;
    max-width:900px;
    margin:0 auto 35px auto;
    padding:0 20px 25px 20px;
    border-bottom:1px solid #30363d;
}

.main-title{
    color:#58a6ff;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    line-height:1.4;
}

.sub-title{
    color:#f0f6fc;
    text-align:center;
    font-size:22px;
    margin-top:10px;
}

.content-wrapper{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.column-box{
    background:#21262d;
    border:1px solid #30363d;
    border-radius:10px;
    padding:18px;
}

.section-title{
    color:#ffffff;
    border-bottom:1px solid #30363d;
    padding-bottom:10px;
    margin-bottom:18px;
    font-size:22px;
    font-weight:bold;
}

/* KELAS */

.class-card{
    background:#0f5132;
    border:1px solid #30363d;
    border-radius:10px;
    padding:12px;
    margin-bottom:16px;
}

.menu-link{
    display:block;
    width:100%;
    padding:14px 16px;
    margin-bottom:10px;

    background:#161b22;
    border:1px solid #30363d;
    border-radius:8px;

    color:#58a6ff;
    text-decoration:none;
}

.menu-link:hover{
    background:#30363d;
}

.wa-link{
    display:block;
    width:100%;
    padding:12px 16px;

    background:#161b22;
    border:1px solid #198754;
    border-radius:8px;

    color:white;
    text-decoration:none;
    text-align:left;
}

.wa-link:hover{
    background:#198754;
}

.info-list{
    padding-left:20px;
}

.info-list li{
    margin-bottom:10px;
}

footer{
    margin-top:30px;
    text-align:center;
    color:#8b949e;
}

@media (max-width:900px){

    .content-wrapper{
        grid-template-columns:1fr;
    }

    .header-box{
        width:100%;
    }

    .main-title{
        font-size:24px;
    }

    .sub-title{
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="container">
<div class="repo-box">

    <div class="header-box">

        <div class="main-title" id="main-title"></div>

        <div class="sub-title" id="sub-title"></div>

    </div>

    <div class="content-wrapper">

        <!-- KOLOM INFO -->

        <div class="column-box">

            <div class="section-title">
                📢 INFORMASI PENTING
            </div>

            <ol class="info-list" id="info-container"></ol>

        </div>

        <!-- KOLOM KELAS 1-3 -->

        <div class="column-box">

            <div class="section-title">
                📚 KELAS 1 - 3
            </div>

            <div id="kelas13-container"></div>

        </div>

        <!-- KOLOM KELAS 4-6 -->

        <div class="column-box">

            <div class="section-title">
                📚 KELAS 4 - 6
            </div>

            <div id="kelas46-container"></div>

        </div>

    </div>

    <footer id="footer-text"></footer>

</div>
</div>

<script>

/* HEADER */

fetch('header.json')
.then(r => r.json())
.then(data => {

    document.getElementById('main-title')
        .textContent = data.judul;

    document.getElementById('sub-title')
        .innerHTML =
            data.subjudul + "<br>" + data.tahun;

    document.getElementById('footer-text')
        .textContent = data.footer;

});

/* INFO */

fetch('info.json')
.then(r => r.json())
.then(data => {

    const container =
        document.getElementById('info-container');

    data.forEach(item => {

        const li =
            document.createElement('li');

        li.textContent = item;

        container.appendChild(li);

    });

});

/* KELAS + WA */

Promise.all([
    fetch('kelas.json').then(r => r.json()),
    fetch('wa.json').then(r => r.json())
])
.then(([kelasData, waData]) => {

    const kelas13 =
        document.getElementById('kelas13-container');

    const kelas46 =
        document.getElementById('kelas46-container');

    kelasData.forEach((kelas, index) => {

        const card =
            document.createElement('div');

        card.className = 'class-card';

        const kelasLink =
            document.createElement('a');

        kelasLink.className = 'menu-link';
        kelasLink.href = kelas.url;
        kelasLink.target = '_blank';
        kelasLink.textContent = kelas.nama;

        const waLink =
            document.createElement('a');

        waLink.className = 'wa-link';
        waLink.href = waData[index].url;
        waLink.target = '_blank';
        waLink.textContent = '💬 Gabung Grup WA';

        card.appendChild(kelasLink);
        card.appendChild(waLink);

        const nomorKelas =
            parseInt(kelas.nama.match(/\d+/)[0]);

        if(nomorKelas <= 3){
            kelas13.appendChild(card);
        }else{
            kelas46.appendChild(card);
        }

    });

});

</script>

</body>
</html>
