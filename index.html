<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAFTAR ROMBEL MURID 2026/2027</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:15px;
    background:#0d1117;
    color:#c9d1d9;
    font-family:Arial, Helvetica, sans-serif;
    line-height:1.5;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
}

.repo-box{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    padding:20px;
}

/* ===== HEADER ===== */

.header-box{
    width:70%;
    max-width:900px;
    margin:0 auto 35px auto;
    padding:0 20px 25px 20px;
    border-bottom:1px solid #30363d;
}

.main-title{
    color:#58a6ff;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    line-height:1.4;
}

.sub-title{
    color:#f0f6fc;
    text-align:center;
    font-size:22px;
    margin-top:10px;
}

/* ===== LAYOUT ===== */

.content-wrapper{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.column-box{
    background:#21262d;
    border:1px solid #30363d;
    border-radius:10px;
    padding:18px;
}

/* ===== SECTION TITLE ===== */

.section-title{
    color:#ffffff;
    border-bottom:1px solid #30363d;
    padding-bottom:10px;
    margin-bottom:18px;
    font-size:22px;
    font-weight:bold;
}

/* ===== KELAS ===== */

.menu-link{
    display:block;
    width:100%;
    padding:14px 16px;
    margin-bottom:10px;

    background:#161b22;
    border:1px solid #30363d;
    border-radius:8px;

    color:#58a6ff;
    text-decoration:none;
    font-size:17px;

    transition:0.2s;
}

.menu-link:hover{
    background:#30363d;
    color:#79c0ff;
    transform:translateX(3px);
}

/* ===== WA ===== */

.wa-link{
    display:block;
    width:100%;
    padding:14px 16px;
    margin-bottom:10px;

    background:#0f5132;
    border:1px solid #198754;
    border-radius:8px;

    color:white;
    text-decoration:none;
    font-size:17px;

    transition:0.2s;
}

.wa-link:hover{
    background:#198754;
}

/* ===== INFO ===== */

.info-list{
    padding-left:22px;
    margin:0;
}

.info-list li{
    margin-bottom:12px;
}

/* ===== FOOTER ===== */

footer{
    margin-top:30px;
    text-align:center;
    color:#8b949e;
    font-size:14px;
}

/* ===== MOBILE ===== */

@media (max-width:900px){

    .content-wrapper{
        grid-template-columns:1fr;
    }

    .header-box{
        width:100%;
        padding:0 10px 20px 10px;
    }

    .main-title{
        font-size:24px;
    }

    .sub-title{
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="repo-box">

    <div class="header-box">

        <div class="main-title">
            DAFTAR ROMBEL / KELAS MURID
        </div>

        <div class="sub-title">
            SD ISLAM CIKAL HARAPAN II<br>
            TAHUN AJARAN 2026/2027
        </div>

    </div>

    <div class="content-wrapper">

        <!-- INFORMASI -->

        <div class="column-box">

            <div class="section-title">
                📢 INFORMASI PENTING
            </div>

            <ol class="info-list" id="info-container">
            </ol>

        </div>

        <!-- DAFTAR KELAS -->

        <div class="column-box">

            <div class="section-title">
                📚 DAFTAR KELAS
            </div>

            <div id="kelas-container"></div>

        </div>

        <!-- WHATSAPP -->

        <div class="column-box">

            <div class="section-title">
                💬 GRUP WHATSAPP
            </div>

            <div id="wa-container"></div>

        </div>

    </div>

    <footer>
        © 2026 Kimi Rifky Alfiansyah
    </footer>

</div>

</div>

<script>

/* =========================
   LOAD INFORMASI
========================= */

fetch('info.json')
.then(response => response.json())
.then(data => {

    const container =
        document.getElementById('info-container');

    data.forEach(item => {

        const li =
            document.createElement('li');

        li.textContent = item;

        container.appendChild(li);

    });

})
.catch(error => console.error(error));


/* =========================
   LOAD KELAS
========================= */

fetch('kelas.json')
.then(response => response.json())
.then(data => {

    const container =
        document.getElementById('kelas-container');

    data.forEach(item => {

        const link =
            document.createElement('a');

        link.className = 'menu-link';
        link.href = item.url;
        link.target = '_blank';
        link.textContent = item.nama;

        container.appendChild(link);

    });

})
.catch(error => console.error(error));


/* =========================
   LOAD WA
========================= */

fetch('wa.json')
.then(response => response.json())
.then(data => {

    const container =
        document.getElementById('wa-container');

    data.forEach(item => {

        const link =
            document.createElement('a');

        link.className = 'wa-link';
        link.href = item.url;
        link.target = '_blank';
        link.textContent = item.nama;

        container.appendChild(link);

    });

})
.catch(error => console.error(error));

</script>

</body>
</html>
